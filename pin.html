<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create PIN</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f4f4f4;
        }

        .container {
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 100%;
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: bold;
        }

        input {
            width: calc(100% - 22px);
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }

        input:focus {
            border-color: #4CAF50;
            outline: none;
        }

        button {
            padding: 12px 15px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
            font-size: 16px;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #45a049;
        }

        #error-message {
            color: red;
            text-align: center;
            display: none;
            margin-top: 10px;
            font-size: 14px;
        }

        #loadingSpinner {
            display: none;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Create Your PIN</h2>
        <form id="pinForm">
            <div class="form-group">
                <label for="accountNumber">Enter Account Number:</label>
                <input type="text" id="accountNumber" placeholder="Enter Account Number" required>
            </div>

            <div class="form-group">
                <label for="pin">Enter PIN (4-6 digits):</label>
                <input type="password" id="pin" placeholder="Enter PIN" required>
            </div>

            <div class="form-group">
                <label for="confirmPin">Confirm PIN:</label>
                <input type="password" id="confirmPin" placeholder="Confirm PIN" required>
            </div>

            <button type="submit">Submit</button>
            <div id="error-message"></div>
            <div id="loadingSpinner">Loading...</div>
        </form>
    </div>

    <!-- Firebase Config -->
    <script type="module" src="firebase-config.js"></script>
    <!-- PIN Creation Logic -->
    <script type="module" src="pin-creation.js"></script>
</body>
</html>
